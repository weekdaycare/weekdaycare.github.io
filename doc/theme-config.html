  </div><article class="md-text content"><figure class="highlight yaml"><figcaption><span>blog/_config.stellar/yml</span></figcaption><table><tr><td class="code"><pre><span class="line"><span class="comment">######## Stellar info ########</span></span><br><span class="line"><span class="attr">stellar:</span></span><br><span class="line">  <span class="attr">version:</span> <span class="string">&#x27;1.27.0&#x27;</span></span><br><span class="line">  <span class="attr">homepage:</span> <span class="string">&#x27;https://xaoxuu.com/wiki/stellar/&#x27;</span></span><br><span class="line">  <span class="attr">repo:</span> <span class="string">&#x27;https://github.com/xaoxuu/hexo-theme-stellar&#x27;</span></span><br><span class="line">  <span class="attr">main_css:</span> <span class="string">/css/main.css</span></span><br><span class="line">  <span class="attr">main_js:</span> <span class="string">/js/main.js</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">######## head tags ########</span></span><br><span class="line"><span class="attr">preconnect:</span></span><br><span class="line">  <span class="comment"># - https://gcore.jsdelivr.net</span></span><br><span class="line">  <span class="comment"># - https://unpkg.com</span></span><br><span class="line">  <span class="comment"># - https://cdn.bootcdn.net</span></span><br><span class="line"></span><br><span class="line"><span class="attr">open_graph:</span></span><br><span class="line">  <span class="attr">enable:</span> <span class="literal">true</span></span><br><span class="line">  <span class="attr">twitter_id:</span> <span class="comment"># for open_graph meta</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">######## Sidebar ########</span></span><br><span class="line"><span class="comment"># 左上角显示的 logo 区域，包含图标、大标题、副标题</span></span><br><span class="line"><span class="attr">logo:</span></span><br><span class="line">  <span class="attr">avatar:</span> <span class="string">&#x27;[&#123;config.avatar&#125;](/about/)&#x27;</span> <span class="comment"># you can set avatar link in _config.yml or &#x27;[https://xxx.png](/about/)&#x27;</span></span><br><span class="line">  <span class="attr">title:</span> <span class="string">&#x27;[&#123;config.title&#125;](/)&#x27;</span> <span class="comment"># you can set html tag like: &#x27;[&lt;img no-lazy height=&quot;32px&quot; src=&quot;xxx&quot;/&gt;](/)&#x27;</span></span><br><span class="line">  <span class="attr">subtitle:</span> <span class="string">&#x27;&#123;config.subtitle&#125;&#x27;</span> <span class="comment"># &#x27;文字1 | 文字2&#x27; (鼠标放上去会切换到文字2)</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 侧边栏主功能导航菜单</span></span><br><span class="line"><span class="attr">menubar:</span></span><br><span class="line">  <span class="attr">columns:</span> <span class="number">4</span> <span class="comment"># 一行多少个</span></span><br><span class="line">  <span class="attr">items:</span> <span class="comment"># 可按照自己需求增加，符合以下格式即可</span></span><br><span class="line">    <span class="comment"># id: 页面中高亮的 menu_id </span></span><br><span class="line">    <span class="comment"># theme: 高亮时的颜色，仅 svg 中 fill=&quot;currentColor&quot; 时有效</span></span><br><span class="line">    <span class="comment"># icon: 支持 svg/img 标签，可以定义在 icons.yml 文件中，也支持外部图片的 URL</span></span><br><span class="line">    <span class="comment"># title: 标题</span></span><br><span class="line">    <span class="comment"># url: 点击跳转到哪，支持相对路径和绝对路径</span></span><br><span class="line">    <span class="comment"># - id: post</span></span><br><span class="line">    <span class="comment">#   theme: &#x27;#1BCDFC&#x27;</span></span><br><span class="line">    <span class="comment">#   icon: solar:documents-bold-duotone</span></span><br><span class="line">    <span class="comment">#   title: 博客</span></span><br><span clas js/services/memos.js</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment"># 扩展插件接入方法：(插件名下面用 #plugin# 代替)</span></span><br><span class="line"><span class="comment"># 1. 在这里增加 #plugin# 配置，至少赢含有 enable 字段，默认为空（不启用）</span></span><br><span class="line"><span class="comment"># 2. 新建文件 layout/_plugins/#plugin#.ejs 文件中设置编写加载代码。</span></span><br><span class="line"><span class="comment"># 2.1. 在该文件中可以直接使用 conf 来读取用户在【步骤 1】填写的配置字段内容</span></span><br><span class="line"><span class="comment"># 2.2. 如果需要引入 css 或 js，可以使用 utils.css(xxx)、utils.js(xxx)，具体可参考 layout/_plugins/fancybox.ejs</span></span><br><span class="line"><span class="comment"># 2.3. 如果需要本地 js 文件，请放入 /source/js/plugins 文件夹中，引入方式为：utils.js(&#x27;/js/plugins/xxx.js&#x27;);</span></span><br><span class="line"><span class="comment"># 3. 如果这个插件只需要引入外部文件，可以在【步骤 1】处增加 inject 字段，而无需进入【步骤 2】创建 ejs，参考 katex</span></span><br><span class="line"><span class="attr">plugins:</span></span><br><span class="line"></span><br><span class="line">  <span class="comment"># preload</span></span><br><span class="line">  <span class="attr">preload:</span></span><br><span class="line">    <span class="attr">enable:</span> <span class="literal">true</span></span><br><span class="line">    <span class="attr">service:</span> <span class="string">flying_pages</span> <span class="comment"># flying_pages</span></span><br><span class="line">    <span class="attr">flying_pages:</span> <span class="string">https://cdn.bootcdn.net/ajax/libs/flying-pages/2.1.2/flying-pages.min.js</span></span><br><span class="line"></span><br><span class="line">  <span class="comment"># lazyload</span></span><br><span class="line">  <span class="comment"># https://www.npmjs.com/package/vanilla-lazyload</span></span><br><span class="line">  <span class="attr">lazyload:</span></span><br><span class="line">    <span class="attr">enable:</span> <span class="literal">true</span> <span class="comment"># [hexo clean &amp;&amp; hexo s] is required after changing this value.</span></span><br><span class="line">    <span class="attr">js:</span> <span class="string">https://cdn.bootcdn.net/ajax/libs/vanilla-lazyload/17.8.4/lazyload.min.js</span></span><br><span class="line">    <span class="attr">transition:</span> <span class="string">fade</span> <span class="comment"># blur, fade</span></span><br><span class="line"></span><br><span class="line">  <span class="comment"># https://fancyapps.com/docs/ui/fancybox/</span></span><br><span class="line">  <span class="comment"># available for &#123;% image xxx %&#125;</span></span><br><span class="line">  <span class="attr">fancybox:</span></span><br><span class="line">    <span class="attr">enable:</span> <span class="literal">true</span></span><br><span class="line">    <span class="attr">loader:</span> <span class="string">/js/plugins/fancybox-loader.js</span></span><br><span class="line">    <span class="attr">js:</span> <span class="string">https://cdn.bootcdn.net/ajax/libs/fancyapps-ui/5.0.22/fancybox/fancybox.umd.min.js</span></span><br><span class="line">    <span class="attr">css:</span> <span class="string">https://cdn.bootcdn.net/ajax/libs/fancyapps-ui/5.0.22/fancybox/fancybox.min.css</span></span><br><span class="line">    <span class="comment"># 让 md 语法图片支持放大可以这样写: .md-text img:not([class]), .md-text .image img</span></span><br><span class="line">    <span class="comment"># 可以处理评论区的图片（不支持 iframe 类评论系统）例如：</span></span><br><span class="line">    <span class="comment"># 使用 twikoo 评论可以写: .tk-content img:not([class*=&quot;emo&quot;])</span></span><br><span class="line">    <span class="comment"># 使用 waline 评论可以写: #waline_container .vcontent img</span></span><br><span class="line">    <span class="attr">selector:</span> <span class="string">.timenode</span> <span class="string">p&gt;img</span> <span class="comment"># 多个选择器用英文逗号隔开</span></span><br><span class="line"></span><br><span class="line">  <span class="comment"># swiper an><br><span class="line">    <span class="attr">field:</span> <span class="string">post</span> <span class="comment"># all, post, wiki</span></span><br><span class="line">    <span class="attr">key:</span> <span class="string">5Q5mpqRK5DkwT1X9Gi5e</span> <span class="comment"># tianli_gpt key</span></span><br><span class="line">    <span class="attr">total_length:</span> <span class="number">1000</span> <span class="comment"># 设置提交的字数限制，默认为1000字，上限为5000，超过5000字符将被截断</span></span><br><span class="line">    <span class="attr">typewriter:</span> <span class="literal">true</span> <span class="comment"># 打字机动画 </span></span><br><span class="line">    <span class="attr">summary_directly:</span> <span class="literal">true</span> <span class="comment"># 是否直接显示摘要，否则显示 AI 简介</span></span><br><span class="line">    <span class="attr">rec_method:</span> <span class="string">all</span> <span class="comment"># all, web # 文章推荐方式，all：匹配数据库内所有文章进行推荐，web：仅当前站内的文章，默认all</span></span><br><span class="line">    <span class="attr">hide_shuttle:</span> <span class="literal">true</span> <span class="comment"># 是否隐藏矩阵穿梭</span></span><br><span class="line">    <span class="attr">summary_toggle:</span> <span class="literal">false</span></span><br><span class="line">    <span class="attr">interface:</span></span><br><span class="line">      <span class="attr">name:</span> <span class="string">AI摘要</span></span><br><span class="line">      <span class="attr">introduce:</span> <span class="string">&#x27;我是文章辅助AI: QX-AI，点击下方的按钮，让我生成本文简介、推荐相关文章等。&#x27;</span></span><br><span class="line">      <span class="attr">version:</span> <span class="string">TianliGPT</span></span><br><span class="line">      <span class="attr">button:</span> [<span class="string">&quot;介绍自己&quot;</span>, <span class="string">&quot;推荐文章&quot;</span>, <span class="string">&quot;生成摘要&quot;</span>, <span class="string">&quot;矩阵穿梭&quot;</span>]</span><br><span class="line"></span><br><span class="line"></span><br><span class=" <script type="text/javascript">
  const utils = {
    // 懒加载 css https://github.com/filamentgroup/loadCSS
    css: (href, before, media, attributes) => {
      var doc = window.document;
      var ss = doc.createElement("link");
      var ref;
      if (before) {
        ref = before;
      } else {
        var refs = (doc.body || doc.getElementsByTagName("head")[0]).childNodes;
        ref = refs[refs.length - 1];
      }
      var sheets = doc.styleSheets;
      if (attributes) {
        for (var attributeName in attributes) {
          if (attributes.hasOwnProperty(attributeName)) {
            ss.setAttribute(attributeName, attributes[attributeName]);
          }
        }
      }
      ss.rel = "stylesheet";
      ss.href = href;
      ss.media = "only x";
      function ready(cb) {
        if (doc.body) {
          return cb();
        }
        setTimeout(function () {
          ready(cb);
        });
      }
      ready(function () {
        ref.parentNode.insertBefore(ss, before ? ref : ref.nextSibling);
      });
      var onloadcssdefined = function (cb) {
        var resolvedHref = ss.href;
        var i = sheets.length;
        while (i--) {
          if (sheets[i].href === resolvedHref) {
            return cb();
          }
        }
        setTimeout(function () {
          onloadcssdefined(cb);
        });
      };
      function loadCB() {
        if (ss.addEventListener) {
          ss.removeEventListener("load", loadCB);
        }
        ss.media = media || "all";
      }
      if (ss.addEventListener) {
        ss.addEventListener("load", loadCB);
      }
      ss.onloadcssdefined = onloadcssdefined;
      onloadcssdefined(loadCB);
      return ss;
    },

    js: (src, opt) => new Promise((resolve, reject) => {
      var script = document.createElement('script');
      if (src.startsWith('/')){
        src = ctx.root + src.substring(1);
      }
      script.src = src;
      if (opt) {
        for (let key of Object.keys(opt)) {
          script[key] = opt[key]
        }
      } else {
        // 默认异步，如果需要同步，第二个参数传入 {} 即可
        script.async = true
      }
      script.onerror = reject
      script.onload = script.onreadystatechange = function() {
        const loadState = this.readyState
        if (loadState && loadState !== 'loaded' && loadState !== 'complete') return
        script.onload = script.onreadystatechange = null
        resolve()
      }
      document.head.appendChild(script)
    }),

    jq: (fn) => {
      if (typeof jQuery === 'undefined') {
        utils.js(deps.jquery).then(fn)
      } else {
        fn()
      }
    },
    
    onLoading: (el) => {
      if (el) {
        $(el).append('<div class="loading-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="2em" height="2em" preserveAspectRatio="xMidYMid meet" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"><path stroke-dasharray="60" stroke-dashoffset="60" stroke-opacity=".3" d="M12 3C16.9706 3 21 7.02944 21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3Z"><animate fill="freeze" attributeName="stroke-dashoffset" dur="1.3s" values="60;0"/></path><path stroke-dasharray="15" stroke-dashoffset="15" d="M12 3C16.9706 3 21 7.02944 21 12"><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.3s" values="15;0"/><animateTransform attributeName="transform" dur="1.5s" repeatCount="indefinite" type="rotate" values="0 12 12;360 12 12"/></path></g></svg></div>');
      }
    },
    onLoadSuccess: (el) => {
      if (el) {
        $(el).find('.loading-wrap').remove();
      }
    },
    onLoadFailure: (el) => {
      if (el) {
        $(el).find('.loading-wrap svg').remove();
        $(el).find('.loading-wrap').append('<svg xmlns="http://www.w3.org/2000/svg" width="2em" height="2em" preserveAspectRatio="xMidYMid meet" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path stroke-dasharray="60" stroke-dashoffset="60" d="M12 3L21 20H3L12 3Z"><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.5s" values="60;0"/></path><path stroke-dasharray="6" stroke-dashoffset="6" d="M12 10V14"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.6s" dur="0.2s" values="6;0"/></path></g><circle cx="12" cy="17" r="1" fill="currentColor" fill-opacity="0"><animate fill="freeze" attributeName="fill-opacity" begin="0.8s" dur="0.4s" values="0;1"/></circle></svg>');
        $(el).find('.loading-wrap').addClass('error');
      }
    },
    request: (el, url, callback, onFailure) => {
      let retryTimes = 3;
      utils.onLoading(el);
      function req() {
        return new Promise((resolve, reject) => {
          let status = 0; // 0 等待 1 完成 2 超时
          let timer = setTimeout(() => {
            if (status === 0) {
              status = 2;
              timer = null;
              reject('请求超时');
              if (retryTimes == 0) {
                onFailure();
              }
            }
          }, 5000);
          fetch(url).then(function(response) {
            if (status !== 2) {
              clearTimeout(timer);
              resolve(response);
              timer = null;
              status = 1;
            }
            if (response.ok) {
              return response.json();
            }
            throw new Error('Network response was not ok.');
          }).then(function(data) {
            retryTimes = 0;
            utils.onLoadSuccess(el);
            callback(data);
          }).catch(function(error) {
            if (retryTimes > 0) {
              retryTimes -= 1;
              setTimeout(() => {
                req();
              }, 5000);
            } else {
              utils.onLoadFailure(el);
              onFailure();
            }
          });
        });
      }
      req();
    },
  };
</script>

<script type="text/javascript">
  (() => {
    const tagSwitchers = document.querySelectorAll('.tag-subtree.parent-tag > a > .tag-switcher-wrapper')
    for (const tagSwitcher of tagSwitchers) {
      tagSwitcher.addEventListener('click', (e) => {
        const parent = e.target.closest('.tag-subtree.parent-tag')
        parent.classList.toggle('expanded')
        e.preventDefault()
      })
    }

    // Get active tag from query string, then activate it.
    const urlParams = new URLSearchParams(window.location.search)
    const activeTag = urlParams.get('tag')
    if (activeTag) {
      let tag = document.querySelector(`.tag-subtree[data-tag="${activeTag}"]`)
      if (tag) {
        tag.querySelector('a').classList.add('active')
        
        while (tag) {
          tag.classList.add('expanded')
          tag = tag.parentElement.closest('.tag-subtree.parent-tag')
        }
      }
    }
  })()
</script>

<script type="text/javascript">
  const applyTheme = (theme) => {
    if (theme === 'auto') {
      document.documentElement.removeAttribute('data-theme')
    } else {
      document.documentElement.setAttribute('data-theme', theme)
    }

    applyThemeToGiscus(theme)
  }

  const applyThemeToGiscus = (theme) => {
    theme = theme === 'auto' ? 'preferred_color_scheme' : theme

    const cmt = document.getElementById('giscus')
    if (cmt) {
      // This works before giscus load.
      cmt.setAttribute('data-theme', theme)
    }

    const iframe = document.querySelector('#comments > section.giscus > iframe')
    if (iframe) {
      // This works after giscus loaded.
      const src = iframe.src
      const newSrc = src.replace(/theme=[\w]+/, `theme=${theme}`)
      iframe.src = newSrc
    }
  }

  const switchTheme = () => {
    // light -> dark -> auto -> light -> ...
    const currentTheme = document.documentElement.getAttribute('data-theme')
    let newTheme;
    switch (currentTheme) {
      case 'light':
        newTheme = 'dark'
        break
      case 'dark':
        newTheme = 'auto'
        break
      default:
        newTheme = 'light'
    }
    applyTheme(newTheme)
    window.localStorage.setItem('Stellar.theme', newTheme)

    const messages = {
      light: `切换到浅色模式`,
      dark: `切换到深色模式`,
      auto: `切换到跟随系统配色`,
    }
    hud?.toast?.(messages[newTheme])
  }

  (() => {
    // Apply user's preferred theme, if any.
    const theme = window.localStorage.getItem('Stellar.theme')
    if (theme !== null) {
      applyTheme(theme)
    }
  })()
</script>
